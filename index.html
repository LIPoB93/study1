<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#173f35"><title>성구 암기 훈련</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" href="icons/icon-192.png"></head><body>
<header class="top"><div><p class="eyebrow">개역한글 · 오프라인 암기</p><h1>성구 암기 훈련</h1></div><span id="netBadge" class="badge">확인 중</span></header>
<nav class="tabs">
<button class="tab active" data-view="home">홈</button><button class="tab" data-view="range">범위 설정</button><button class="tab" data-view="study">시험</button><button class="tab" data-view="wrong">오답노트</button><button class="tab" data-view="calendar">달력</button>
</nav>
<main>
<section id="homeView" class="view active">
<div class="hero"><div><p class="muted">저장된 학습 범위</p><strong id="rangeCount">0개</strong></div><div><p class="muted">미해결 오답</p><strong id="wrongCount">0개</strong></div><div><p class="muted">토씨 통과</p><strong id="passCount">0회</strong></div></div>
<div class="section-title"><h2>내 학습 범위</h2><button id="goRange" class="text-btn">새 범위 만들기</button></div><div id="rangeCards" class="cards"></div>
</section>
<section id="rangeView" class="view">
<h2>시험 범위 설정</h2><p class="muted">여러 구간을 하나의 시험 범위로 묶을 수 있습니다.</p>
<div class="panel"><label>범위 이름<input id="rangeName" placeholder="예: 이번 주 암기"></label>
<div class="grid4"><label>성경<select id="bookSelect"></select></label><label>장<select id="chapterSelect"></select></label><label>시작 절<select id="startVerse"></select></label><label>끝 절<select id="endVerse"></select></label></div>
<button id="addSegment" class="secondary">구간 추가</button><div id="segmentList" class="segment-list"></div><button id="saveRange" class="primary wide">범위 저장</button></div>
</section>
<section id="studyView" class="view">
<div class="study-head"><div><p class="muted">현재 시험</p><h2 id="studyTitle">범위를 선택하세요</h2></div><select id="modeSelect"><option value="typing">직접 입력 · 토씨 검사</option><option value="blank">빈칸 채우기</option><option value="read">본문 읽기</option></select></div>
<div id="studyToolbar" class="toolbar hidden"><button id="prevVerse" class="secondary">이전</button><span id="studyProgress">0/0</span><button id="nextVerse" class="secondary">다음</button></div>
<div id="studyArea" class="panel empty">홈에서 시험할 범위를 선택하세요.</div><div id="studyActions" class="actions hidden"><button id="checkAnswer" class="primary">정답 확인</button><button id="showAnswer" class="secondary">정답 보기</button></div>
</section>
<section id="wrongView" class="view"><div class="section-title"><div><h2>오답노트</h2><p class="muted">같은 절은 한 항목으로 누적됩니다.</p></div><select id="wrongFilter"><option value="active">복습 필요</option><option value="resolved">통과 완료</option><option value="all">전체</option></select></div><div id="wrongList" class="cards"></div></section>
<section id="calendarView" class="view"><div class="calendar-head"><button id="prevMonth" class="secondary">‹</button><h2 id="monthLabel"></h2><button id="nextMonth" class="secondary">›</button></div><div class="week"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div id="calendarGrid" class="calendar-grid"></div><div id="dayDetail" class="panel"></div></section>
</main>
<footer>성경전서 개역한글판 · 본문 동일성 유지 · 학습 기록은 현재 기기에만 저장됩니다.</footer>
<script src="bible-data.js"></script><script src="app.js"></script></body></html>
